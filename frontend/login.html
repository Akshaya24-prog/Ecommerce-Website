<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In · Marketstand</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">Market<span class="dot">stand</span></a>
      <nav class="main-nav">
        <a href="index.html" data-nav="catalog">Shop</a>
        <a href="orders.html" data-nav="orders">My Orders</a>
        <a href="admin-dashboard.html" data-nav="admin" class="admin-link" id="adminNavLink" hidden>Admin</a>
      </nav>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </header>

  <main class="auth-shell">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to manage your cart and orders.</p>

      <div class="alert alert-error" id="authError" hidden></div>

      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="pw-wrap">
            <input type="password" id="password" required autocomplete="current-password">
            <button type="button" class="pw-toggle" aria-label="Show password" onclick="
              var i=document.getElementById('password');
              var show=i.type==='password';
              i.type=show?'text':'password';
              this.innerHTML=show?'<svg width=18 height=18 viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\'><path d=\'M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24\'/><line x1=\'1\' y1=\'1\' x2=\'23\' y2=\'23\'/></svg>':'<svg width=18 height=18 viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'currentColor\' stroke-width=\'2\'><path d=\'M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\'/><circle cx=\'12\' cy=\'12\' r=\'3\'/></svg>';
            ">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
      </form>

      <p class="auth-switch">New here? <a href="register.html">Create an account</a></p>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Marketstand. Built for hands-on full-stack practice.</div>
  </footer>

  <div id="toast-stack"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
