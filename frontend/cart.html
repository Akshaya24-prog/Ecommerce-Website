<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart · Marketstand</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cart" data-requires-auth="true">

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">Market<span class="dot">stand</span></a>
      <nav class="main-nav">
        <a href="index.html" data-nav="catalog">Shop</a>
        <a href="orders.html" data-nav="orders">My Orders</a>
        <a href="admin-dashboard.html" data-nav="admin" class="admin-link" id="adminNavLink" hidden>Admin</a>
      </nav>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </header>

  <main>
    <div class="page-head container">
      <div class="breadcrumb"><a href="index.html">Shop</a> / Cart</div>
      <h1>Your Cart</h1>
    </div>

    <div class="split-layout container">
      <div id="cartItemsContainer">
        <div class="loading-row">Loading your cart…</div>
      </div>

      <aside class="summary-card">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="summarySubtotal">₹0.00</span></div>
        <div class="summary-row"><span>Shipping</span><span>Free</span></div>
        <div class="summary-row total"><span>Total</span><span class="price-tag" id="summaryTotal">₹0.00</span></div>
        <button type="button" class="btn btn-primary btn-block" id="checkoutBtn" disabled style="margin-top: 18px;">
          Proceed to Checkout
        </button>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Marketstand. Built for hands-on full-stack practice.</div>
  </footer>

  <div id="toast-stack"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
