<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout · Marketstand</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="checkout" data-requires-auth="true">

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">Market<span class="dot">stand</span></a>
      <nav class="main-nav">
        <a href="index.html" data-nav="catalog">Shop</a>
        <a href="orders.html" data-nav="orders">My Orders</a>
        <a href="admin-dashboard.html" data-nav="admin" class="admin-link" id="adminNavLink" hidden>Admin</a>
      </nav>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </header>

  <main>
    <div class="page-head container">
      <div class="breadcrumb"><a href="index.html">Shop</a> / <a href="cart.html">Cart</a> / Checkout</div>
      <h1>Checkout</h1>
    </div>

    <div class="split-layout container">
      <form id="checkoutForm">
        <div class="field">
          <label for="shippingAddress">Shipping address</label>
          <textarea id="shippingAddress" required placeholder="Street, city, state, ZIP"></textarea>
        </div>
        <div class="field">
          <label for="contactPhone">Contact phone (optional)</label>
          <input type="tel" id="contactPhone" placeholder="12345 54321">
        </div>
        <div class="alert alert-error" id="checkoutError" hidden></div>
        <button type="submit" class="btn btn-primary btn-block" id="placeOrderBtn">Place Order</button>
      </form>

      <aside class="summary-card">
        <h3>Order Summary</h3>
        <div id="checkoutItems">
          <div class="loading-row">Loading…</div>
        </div>
        <div class="summary-row total"><span>Total</span><span class="price-tag" id="checkoutTotal">₹0.00</span></div>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Marketstand. Built for hands-on full-stack practice.</div>
  </footer>

  <div id="toast-stack"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
