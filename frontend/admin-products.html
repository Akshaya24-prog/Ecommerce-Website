<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products · Marketstand</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="admin-products" data-requires-admin="true">

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">Market<span class="dot">stand</span></a>
      <nav class="main-nav">
        <a href="index.html" data-nav="catalog">Shop</a>
        <a href="orders.html" data-nav="orders">My Orders</a>
        <a href="admin-dashboard.html" data-nav="admin" class="admin-link" id="adminNavLink" hidden>Admin</a>
      </nav>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </header>

  <div class="admin-shell">
    <aside class="admin-sidebar">
      <span class="eyebrow">Admin</span>
      <a href="admin-dashboard.html" data-nav="admin-dashboard">Dashboard</a>
      <a href="admin-products.html" data-nav="admin-products">Products</a>
      <a href="admin-orders.html" data-nav="admin-orders">Orders</a>
      <a href="admin-users.html" data-nav="admin-users">Users</a>
    </aside>

    <main class="admin-main">
      <div class="admin-main-head">
        <h1>Products</h1>
        <button type="button" class="btn btn-primary" id="addProductBtn">Add Product</button>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>All Products</h2>
          <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"/><path d="M21 21l-3.5-3.5"/>
            </svg>
            <input type="text" id="productSearchInput" placeholder="Search products…">
          </div>
        </div>
        <div id="productsTableContainer">
          <div class="loading-row">Loading products…</div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="productModalOverlay" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="productModalTitle">Add Product</h2>
        <button type="button" class="modal-close" id="productModalClose" aria-label="Close">&times;</button>
      </div>
      <form id="productForm">
        <input type="hidden" id="productId">

        <div class="field">
          <label for="productName">Name</label>
          <input type="text" id="productName" required>
        </div>

        <div class="form-row-2">
          <div class="field">
            <label for="productPrice">Price</label>
            <input type="number" id="productPrice" min="0" step="0.01" required>
          </div>
          <div class="field">
            <label for="productStock">Stock</label>
            <input type="number" id="productStock" min="0" step="1" required>
          </div>
        </div>

        <div class="field">
          <label for="productCategory">Category</label>
          <select id="productCategory">
            <option value="">Uncategorized</option>
          </select>
        </div>

        <div class="field">
          <label for="productDescription">Description</label>
          <textarea id="productDescription" rows="4"></textarea>
        </div>

        <div class="field">
          <label for="productImageUrl">Image URL</label>
          <input type="url" id="productImageUrl" placeholder="https://example.com/image.jpg">
          <span class="field-hint">Paste an image link. Leave empty to keep the current image when editing.</span>
        </div>

        <div class="field">
          <label>
            <input type="checkbox" id="productActive" checked>
            Active (visible in the storefront)
          </label>
        </div>

        <div class="alert" id="productFormError" hidden></div>

        <div class="modal-foot">
          <button type="button" class="btn btn-outline" id="productCancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="productSaveBtn">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-stack"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/admin-products.js"></script>
</body>
</html>
