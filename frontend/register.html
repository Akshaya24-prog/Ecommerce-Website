<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up · Marketstand</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="register">

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">Market<span class="dot">stand</span></a>
      <nav class="main-nav">
        <a href="index.html" data-nav="catalog">Shop</a>
        <a href="orders.html" data-nav="orders">My Orders</a>
        <a href="admin-dashboard.html" data-nav="admin" class="admin-link" id="adminNavLink" hidden>Admin</a>
      </nav>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </header>

  <main class="auth-shell">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="sub">New accounts can shop right away — admin access is granted separately.</p>

      <div class="alert alert-error" id="authError" hidden></div>

      <form id="registerForm">
        <div class="field">
          <label for="regUsername">Username</label>
          <input type="text" id="regUsername" required autocomplete="username">
        </div>
        <div class="field">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" required autocomplete="email">
        </div>
        <div class="field">
          <label for="regPhone">Phone number (optional)</label>
          <input type="tel" id="regPhone" autocomplete="tel">
        </div>
        <div class="form-row-2">
          <div class="field">
            <label for="regPassword">Password</label>
            <input type="password" id="regPassword" required autocomplete="new-password">
          </div>
          <div class="field">
            <label for="regPassword2">Confirm password</label>
            <input type="password" id="regPassword2" required autocomplete="new-password">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">© 2026 Marketstand. Built for hands-on full-stack practice.</div>
  </footer>

  <div id="toast-stack"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
