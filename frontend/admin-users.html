<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registered Users · Marketstand</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="admin-users" data-requires-admin="true">

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="brand">Market<span class="dot">stand</span></a>
      <nav class="main-nav">
        <a href="index.html" data-nav="catalog">Shop</a>
        <a href="orders.html" data-nav="orders">My Orders</a>
        <a href="admin-dashboard.html" data-nav="admin" class="admin-link" id="adminNavLink" hidden>Admin</a>
      </nav>
      <div class="nav-actions" id="navActions"></div>
    </div>
  </header>

  <div class="admin-shell">
    <aside class="admin-sidebar">
      <span class="eyebrow">Admin</span>
      <a href="admin-dashboard.html" data-nav="admin-dashboard">Dashboard</a>
      <a href="admin-products.html" data-nav="admin-products">Products</a>
      <a href="admin-orders.html" data-nav="admin-orders">Orders</a>
      <a href="admin-users.html" data-nav="admin-users">Users</a>
    </aside>

    <main class="admin-main">
      <div class="admin-main-head">
        <h1>Registered Users</h1>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>All Users</h2>
          <div class="search-box">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"/><path d="M21 21l-3.5-3.5"/>
            </svg>
            <input type="text" id="userSearchInput" placeholder="Search users…">
          </div>
        </div>
        <div id="usersTableContainer">
          <div class="loading-row">Loading users…</div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-stack"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/admin-users.js"></script>
</body>
</html>
